<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LILY Digital Library</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --bg-color: #FDFBF7;
            --text-color: #2C2C2C;
            --accent-color: #8B5A2B;
            --secondary-accent: #5D4037;
            --gold: #D4AF37;
            --nav-bg: #F4F1EA;
            --font-hand: 'Great Vibes', cursive;
            --font-serif: 'Cormorant Garamond', serif;
            --font-body: 'Playfair Display', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-body);
            overflow-x: hidden;
        }

        /* --- 1. LANDING PAGE --- */
        #landing-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1507842217121-9e9f14791849?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease, visibility 1s ease;
        }

        #landing-page.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .library-name {
            font-family: var(--font-hand);
            font-size: 5rem;
            color: var(--gold);
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }

        .welcome-text {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            font-style: italic;
            margin-bottom: 40px;
            line-height: 1.6;
            color: #fff;
            animation: fadeIn 2s ease-in-out;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-family: var(--font-serif);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: var(--gold);
            color: #fff;
            transform: translateY(-2px);
        }

        .btn-guest {
            border-color: #ccc;
            color: #ccc;
        }

        .btn-guest:hover {
            background: #ccc;
            color: #333;
        }

        /* --- 2. MAIN APP --- */
        #main-app {
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #main-app.visible {
            display: block;
            opacity: 1;
        }

        /* Header */
        header {
            background-color: var(--nav-bg);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-logo h1 {
            font-family: var(--font-hand);
            font-size: 2.5rem;
            color: var(--secondary-accent);
        }

        .header-desc {
            font-size: 0.9rem;
            color: var(--accent-color);
            font-style: italic;
        }

        /* Navigation */
        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--gold);
            transition: width 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        nav a.locked {
            color: #999;
            cursor: not-allowed;
        }

        nav a.locked::after {
            display: none;
        }

        #hamburger {
            display: none;
            font-size: 1.5rem;
            background: none;
            border: none;
            cursor: pointer;
        }

        /* Sections */
        section {
            padding: 60px 10%;
            min-height: 80vh;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-family: var(--font-serif);
            font-size: 3rem;
            color: var(--secondary-accent);
            margin-bottom: 40px;
            text-align: center;
            border-bottom: 1px solid var(--gold);
            display: inline-block;
            padding-bottom: 10px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }

        /* Home Page Content */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .media-card {
            background: #fff;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            transition: transform 0.3s;
        }

        .media-card:hover {
            transform: translateY(-5px);
        }

        .media-card h3 {
            font-family: var(--font-serif);
            margin-bottom: 15px;
            color: var(--accent-color);
        }

        iframe {
            width: 100%;
            height: 200px;
            border: none;
        }

        .music-link {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: var(--gold);
            text-decoration: none;
            font-weight: bold;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .preview-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .preview-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .preview-item:hover img {
            transform: scale(1.05);
        }

        .preview-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px;
            text-align: center;
        }

        /* About Page */
        .about-content {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            font-size: 1.2rem;
            line-height: 1.8;
        }

        .about-content p {
            margin-bottom: 20px;
        }

        /* Community Page */
        .post-form {
            max-width: 600px;
            margin: 0 auto 40px auto;
            background: #fff;
            padding: 20px;
            border: 1px solid #ddd;
        }

        .post-form input, .post-form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            font-family: var(--font-body);
        }

        .posts-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .post {
            background: #fff;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid var(--gold);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #666;
        }

        .post-actions {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #888;
            margin-right: 15px;
            font-size: 0.9rem;
        }

        .action-btn:hover {
            color: var(--accent-color);
        }

        .action-btn.liked {
            color: #e74c3c;
        }

        /* Contact Page */
        .contact-container {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
        }

        .contact-card {
            flex: 1;
            min-width: 300px;
            background: #fff;
            padding: 30px;
            text-align: center;
            border: 1px solid #eee;
        }

        .drive-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #4285F4;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        .suggestion-box textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            font-family: var(--font-body);
        }

        /* Footer */
        footer {
            background-color: var(--secondary-accent);
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .library-name { font-size: 3.5rem; }
            .preview-grid { grid-template-columns: 1fr; }
            nav {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                right: 0;
                background: var(--nav-bg);
                width: 100%;
                padding: 20px;
                box-shadow: 0 5px 5px rgba(0,0,0,0.1);
            }
            nav.active { display: flex; }
            #hamburger { display: block; }
        }
    </style>
</head>

<script>

/* =========================
   USER SESSION
========================= */

let currentUser = null;

/* =========================
   ENTER SITE
========================= */

function enterSite(mode){

const landing = document.getElementById("landing-page");
const app = document.getElementById("main-app");

landing.classList.add("hidden");
app.classList.add("visible");

if(mode === "guest"){
currentUser = "guest";
return;
}

if(mode === "login"){
loginUser();
}

if(mode === "signup"){
signupUser();
}

}

/* =========================
   LOGIN
========================= */

function loginUser(){

let username = prompt("Username");
let password = prompt("Password");

let users = JSON.parse(localStorage.getItem("lily_users") || "{}");

if(users[username] && users[username] === password){

currentUser = username;
unlockCommunity();
alert("Welcome back " + username);

}else{

alert("Login failed");

}

}

/* =========================
   SIGNUP
========================= */

function signupUser(){

let username = prompt("Create username");
let password = prompt("Create password");

let users = JSON.parse(localStorage.getItem("lily_users") || "{}");

users[username] = password;

localStorage.setItem("lily_users", JSON.stringify(users));

alert("Account created. Please login.");

}

/* =========================
   UNLOCK COMMUNITY
========================= */

function unlockCommunity(){

const link = document.getElementById("community-link");

if(link){
link.classList.remove("locked");
}

}

/* =========================
   NAVIGATION
========================= */

function showSection(sectionId){

const sections = document.querySelectorAll("section");

sections.forEach(section => {

section.classList.remove("active");

});

const target = document.getElementById(sectionId);

if(target){

target.classList.add("active");

window.scrollTo({
top:0,
behavior:"smooth"
});

}

}

/* =========================
   COMMUNITY ACCESS
========================= */

function checkAccess(sectionId){

if(!currentUser || currentUser === "guest"){

alert("Community requires login.");
return;

}

showSection(sectionId);

}

/* =========================
   HAMBURGER MENU
========================= */

const hamburger = document.getElementById("hamburger");
const navMenu = document.getElementById("nav-menu");

if(hamburger){

hamburger.addEventListener("click", () => {

navMenu.classList.toggle("active");

});

}

/* =========================
   COMMUNITY POSTS
========================= */

function createPost(){

if(!currentUser){

alert("Login first");
return;

}

let text = document.getElementById("postInput").value;

if(!text) return;

let posts = JSON.parse(localStorage.getItem("lily_posts") || "[]");

posts.unshift({

user: currentUser,
text: text,
likes: 0,
comments: []

});

localStorage.setItem("lily_posts", JSON.stringify(posts));

document.getElementById("postInput").value = "";

renderPosts();

}

function likePost(i){

let posts = JSON.parse(localStorage.getItem("lily_posts") || "[]");

posts[i].likes++;

localStorage.setItem("lily_posts", JSON.stringify(posts));

renderPosts();

}

function commentPost(i){

let text = prompt("Write comment");

if(!text) return;

let posts = JSON.parse(localStorage.getItem("lily_posts") || "[]");

posts[i].comments.push({

user: currentUser,
text: text

});

localStorage.setItem("lily_posts", JSON.stringify(posts));

renderPosts();

}

function renderPosts(){

let posts = JSON.parse(localStorage.getItem("lily_posts") || "[]");

const container = document.getElementById("posts-container");

if(!container) return;

container.innerHTML = "";

posts.forEach((post,i)=>{

let div = document.createElement("div");

div.className = "post";

div.innerHTML = `
<div class="post-header">
<b>${post.user}</b>
</div>

<p>${post.text}</p>

<div class="post-actions">

<button class="action-btn" onclick="likePost(${i})">
❤️ ${post.likes}
</button>

<button class="action-btn" onclick="commentPost(${i})">
💬 Comment
</button>

</div>

${post.comments.map(c=>`
<div class="comment">
<b>${c.user}:</b> ${c.text}
</div>
`).join("")}

`;

container.appendChild(div);

});

}

renderPosts();

</script>
   
<body>

    <!-- 1. LANDING PAGE -->
    <div id="landing-page">
        <div class="landing-content">
            <div class="library-name">LILY</div>
            <p class="welcome-text">
                "Where words breathe and silence sings,<br>
                A digital garden for the wandering mind."
            </p>
            <div class="btn-group">
                <button class="btn" onclick="enterSite('login')">Log In</button>
                <button class="btn" onclick="enterSite('signup')">Sign In</button>
                <button class="btn btn-guest" onclick="enterSite('guest')">Guest Mode</button>
            </div>
        </div>
    </div>

    <!-- 2. MAIN APP -->
    <div id="main-app">
        <header>
            <div class="header-logo">
                <h1>LILY</h1>
                <div class="header-desc">A sanctuary for literature, art, and quiet thought.</div>
            </div>
            <button id="hamburger">☰</button>
            <nav id="nav-menu">
                <a onclick="showSection('home')">Home</a>
                <a onclick="showSection('about')">About</a>
                <a id="community-link" class="locked" onclick="checkAccess('community')">Community</a>
                <a onclick="showSection('contact')">Contact</a>
            </nav>
        </header>

        <!-- HOME SECTION -->
        <section id="home" class="active">
            <div class="section-header">
                <h2>Explore & Listen</h2>
            </div>

            <div class="media-grid">
                <div class="media-card">
                    <h3>Visual Poetry</h3>
                    <iframe src="https://www.youtube.com/embed/8xJHhRk6j1w" allowfullscreen></iframe>
                </div>
                <div class="media-card">
                    <h3>Audio Atmosphere</h3>
                    <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DX3Ogo9pFvB
