<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House of Verses · Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --lavender:       #b8a9d9;
  --lavender-light: #ddd6f0;
  --lavender-pale:  #f0edf9;
  --lavender-deep:  #7c6aad;
  --purple-blue:    #8fa8d8;
  --purple-blue-lt: #ccdaf5;
  --purple-blue-dp: #4a6faf;
  --white:          #ffffff;
  --soft-white:     #fafafe;
  --text-dark:      #2d2145;
  --text-mid:       #6b5f8a;
  --text-light:     #a498c0;
  --border:         #e2daf2;
}

body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
  background: linear-gradient(135deg, #e8e2f8 0%, #dde8f8 40%, #e4dff5 70%, #d8e8f5 100%);
  position: relative;
}

/* ── FLOATING BG ORBS ── */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(60px);
  pointer-events: none;
  z-index: 0;
  animation: orbFloat 8s ease-in-out infinite;
}
.orb1 { width: 380px; height: 380px; background: rgba(184,169,217,0.35); top: -100px; left: -80px; animation-delay: 0s; }
.orb2 { width: 300px; height: 300px; background: rgba(143,168,216,0.3); bottom: -80px; right: -60px; animation-delay: 3s; }
.orb3 { width: 200px; height: 200px; background: rgba(176,161,220,0.25); top: 40%; left: 40%; animation-delay: 5s; }

@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50%       { transform: translate(20px, -20px) scale(1.05); }
}

/* floating sparkles */
.sparkle {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  font-size: 1rem;
  animation: sparkleFade 4s ease-in-out infinite;
  opacity: 0;
}
.sp1  { top: 12%; left: 8%;  animation-delay: 0s;   font-size: 0.9rem; }
.sp2  { top: 25%; left: 20%; animation-delay: 1.3s; font-size: 0.7rem; }
.sp3  { top: 8%;  right: 15%;animation-delay: 2.1s; font-size: 1.1rem; }
.sp4  { top: 60%; left: 5%;  animation-delay: 0.7s; font-size: 0.8rem; }
.sp5  { bottom: 20%; right: 8%; animation-delay: 3.2s; font-size: 0.9rem; }
.sp6  { bottom: 10%; left: 30%; animation-delay: 1.8s; font-size: 0.75rem; }
@keyframes sparkleFade {
  0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
  40%, 60%  { opacity: 0.7; transform: scale(1) rotate(20deg); }
}

/* ── MAIN CARD ── */
.card {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 920px;
  min-height: 560px;
  background: var(--white);
  border-radius: 32px;
  display: grid;
  grid-template-columns: 46% 54%;
  box-shadow:
    0 40px 100px rgba(100, 80, 160, 0.18),
    0 8px 32px rgba(100, 80, 160, 0.1),
    inset 0 1px 0 rgba(255,255,255,0.9);
  overflow: hidden;
  animation: cardIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

@keyframes cardIn {
  from { opacity: 0; transform: scale(0.9) translateY(30px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* ── LEFT PANEL ── */
.left-panel {
  position: relative;
  border-radius: 28px;
  margin: 8px;
  overflow: hidden;
  background: linear-gradient(155deg, #c8bfe8 0%, #a8b8e0 40%, #9aacd8 70%, #8a9cce 100%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  min-height: 520px;
}

/* inner glow top */
.left-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 90% 55% at 50% -5%, rgba(255,255,255,0.5) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(124,106,173,0.3) 0%, transparent 60%);
  z-index: 0;
  pointer-events: none;
}

/* decorative dots pattern */
.left-panel::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px);
  background-size: 28px 28px;
  z-index: 0;
  pointer-events: none;
}

/* ── KAPIBOO STAGE ── */
.kapi-stage {
  position: absolute;
  inset: 0;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-bottom: 90px;
}

/* The actual image wrapper — JS controls transform here */
#kapiWrap {
  position: relative;
  width: 260px;
  cursor: none;
  transform-origin: center bottom;
  will-change: transform;
}

#kapiImg {
  width: 100%;
  height: auto;
  display: block;
  filter: drop-shadow(0 16px 28px rgba(60,40,120,0.22));
  user-select: none;
  -webkit-user-drag: none;
}

/* emotion overlay bubble */
#emoBubble {
  position: absolute;
  top: -18px;
  right: -10px;
  background: white;
  border-radius: 20px 20px 20px 4px;
  padding: 6px 12px;
  font-size: 1.3rem;
  box-shadow: 0 4px 14px rgba(100,80,160,0.15);
  opacity: 0;
  transform: scale(0.5) translateY(8px);
  transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
  white-space: nowrap;
  z-index: 5;
}

#emoBubble.show {
  opacity: 1;
  transform: scale(1) translateY(0);
}

/* tagline area */
.left-tagline {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 3;
  padding: 24px 28px;
  background: linear-gradient(to top, rgba(100,80,160,0.45) 0%, transparent 100%);
}

.tagline-main {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1.6rem;
  font-weight: 700;
  color: white;
  line-height: 1.25;
  text-shadow: 0 2px 12px rgba(60,40,120,0.35);
  display: block;
  margin-bottom: 6px;
}

.tagline-sub {
  font-family: 'Nunito', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  color: rgba(255,255,255,0.78);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* floating book icons in left panel */
.book-deco {
  position: absolute;
  z-index: 1;
  font-size: 1.4rem;
  opacity: 0.28;
  pointer-events: none;
  animation: bookDrift 6s ease-in-out infinite;
}
.bd1 { top: 8%;  left: 10%; animation-delay: 0s;   font-size: 1.1rem; }
.bd2 { top: 14%; right: 12%; animation-delay: 1.5s; font-size: 0.9rem; }
.bd3 { top: 30%; left: 5%;  animation-delay: 3s;   font-size: 1.2rem; }
.bd4 { top: 5%;  right: 22%; animation-delay: 2s;   font-size: 0.8rem; }

@keyframes bookDrift {
  0%, 100% { transform: translateY(0px) rotate(-5deg); opacity: 0.28; }
  50%       { transform: translateY(-10px) rotate(5deg); opacity: 0.4; }
}

/* ── RIGHT PANEL ── */
.right-panel {
  padding: 48px 44px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0;
  background: var(--soft-white);
}

/* brand */
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 30px;
}

.brand-mark {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--lavender) 0%, var(--purple-blue) 100%);
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: 0 4px 10px rgba(124,106,173,0.3);
}

.brand-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text-dark);
  letter-spacing: 0.01em;
}
.brand-text span { color: var(--lavender-deep); }

/* heading */
.form-heading {
  font-family: 'Nunito', sans-serif;
  font-size: 1.75rem;
  font-weight: 900;
  color: var(--text-dark);
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}

.form-sub {
  font-size: 0.85rem;
  color: var(--text-light);
  font-weight: 500;
  margin-bottom: 26px;
  line-height: 1.5;
}

/* two-col name row */
.name-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}

.form-group { margin-bottom: 14px; }
.form-group:last-of-type { margin-bottom: 0; }

label {
  display: block;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-mid);
  margin-bottom: 6px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

input[type="text"],
input[type="email"],
input[type="password"] {
  width: 100%;
  padding: 11px 15px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.88rem;
  color: var(--text-dark);
  background: var(--white);
  outline: none;
  transition: border-color 0.22s, box-shadow 0.22s, background 0.22s;
}

input:focus {
  border-color: var(--lavender);
  box-shadow: 0 0 0 3.5px rgba(184,169,217,0.22);
  background: #fff;
}

input::placeholder { color: var(--text-light); font-weight: 400; }

/* password row with toggle */
.pw-wrap { position: relative; }
.pw-wrap input { padding-right: 44px; }
.pw-toggle {
  position: absolute;
  right: 13px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1rem;
  color: var(--text-light);
  padding: 0;
  line-height: 1;
  transition: color 0.2s;
}
.pw-toggle:hover { color: var(--lavender-deep); }

/* terms row */
.terms-row {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  margin: 16px 0 18px;
  font-size: 0.78rem;
  color: var(--text-light);
  line-height: 1.5;
}
.terms-row input[type="checkbox"] {
  width: 15px; height: 15px;
  accent-color: var(--lavender-deep);
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 1px;
}
.terms-row a { color: var(--lavender-deep); text-decoration: none; font-weight: 600; }
.terms-row a:hover { text-decoration: underline; }

/* submit button */
.btn-submit {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--lavender-deep) 0%, var(--purple-blue-dp) 100%);
  color: white;
  border: none;
  border-radius: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 6px 20px rgba(124,106,173,0.35);
  margin-bottom: 12px;
}
.btn-submit:hover {
  opacity: 0.92;
  transform: translateY(-1px);
  box-shadow: 0 10px 28px rgba(124,106,173,0.4);
}
.btn-submit:active { transform: translateY(0); }

/* divider */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  color: var(--text-light);
  font-size: 0.75rem;
  font-weight: 600;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* google btn */
.btn-google {
  width: 100%;
  padding: 11px;
  background: var(--white);
  color: var(--text-mid);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 20px;
}
.btn-google:hover { border-color: var(--lavender); background: var(--lavender-pale); }

/* sign in link */
.signin-row {
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-light);
  font-weight: 500;
}
.signin-row a {
  color: var(--lavender-deep);
  font-weight: 700;
  text-decoration: none;
}
.signin-row a:hover { text-decoration: underline; }

/* ── STATUS BADGE ── */
#statusBadge {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--text-dark);
  color: white;
  font-family: 'Nunito', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  padding: 8px 20px;
  border-radius: 40px;
  z-index: 200;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
  opacity: 0;
  pointer-events: none;
}
#statusBadge.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ── RESPONSIVE ── */
@media (max-width: 680px) {
  .card { grid-template-columns: 1fr; }
  .left-panel { min-height: 220px; margin: 8px 8px 0; }
  #kapiWrap { width: 160px; }
  .kapi-stage { padding-bottom: 60px; }
  .right-panel { padding: 28px 24px; }
  .name-row { grid-template-columns: 1fr; gap: 0; }
}
</style>
</head>

<!-- bg orbs -->

<div class="sparkle sp1">✦</div>

<div class="sparkle sp3">✦</div>
<div class="sparkle sp4">✧</div>
<div class="sparkle sp5">✦</div>
<div class="sparkle sp6">✧</div>

<!-- ── MAIN CARD ── -->
<div class="card">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="book-deco bd1">📖</div>
    <div class="book-deco bd2">📜</div>
    <div class="book-deco bd3">✒️</div>
    <div class="book-deco bd4">🪶</div>

    <!-- Kapiboo stage -->

        <div id="emoBubble">😴 zzz…</div>

        <img id="kapiImg"

             alt="Kapiboo — your library guide"

  <!-- RIGHT PANEL -->
  <div class="right-panel">

        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>

    <div class="signin-row">Already have an account? <a href="#">Sign in</a></div>

  </div>
</div>

<!-- status badge -->
<div id="statusBadge">🎉 Welcome to House of Verses!</div>

<script>
// ══════════════════════════════════════════════
//  KAPIBOO ANIMATION SYSTEM
// ══════════════════════════════════════════════

const kapiWrap  = document.getElementById('kapiWrap');
const emoBubble = document.getElementById('emoBubble');

// --- State ---
let currentRot  = 0;
let targetRot   = 0;
let currentBobY = 0;
let bobTime     = 0;
let lastTs      = null;

// Idle tracking
let lastMoveTime = Date.now();
let idleState    = 'normal'; // 'normal' | 'wave' | 'sleepy'
let idleTimer    = null;
let isHovering   = false;

// Emotion content
const emotions = {
  normal: null,
  wave:   '👋 Hi there!',
  sleepy: '😴 zzz…',
  happy:  '✨ Let\'s read!',
};

// ── Show / hide emotion bubble ──
function showBubble(text) {
  emoBubble.textContent = text;
  emoBubble.classList.add('show');
}
function hideBubble() {
  emoBubble.classList.remove('show');
}

// ── Set idle state ──
function setIdle(state) {
  if (idleState === state) return;
  idleState = state;

  if (state === 'wave') {
    showBubble(emotions.wave);
    // shake the arm via rotation burst
    targetRot = 14;
    setTimeout(() => { targetRot = -14; }, 220);
    setTimeout(() => { targetRot = 10; },  440);
    setTimeout(() => { targetRot = -10; }, 660);
    setTimeout(() => { if (idleState === 'wave') targetRot = 0; }, 880);
  } else if (state === 'sleepy') {
    showBubble(emotions.sleepy);
  } else {
    hideBubble();
  }
}

// ── Schedule idle transitions ──
function scheduleIdle() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    // After 4s idle → wave
    setIdle('wave');
    idleTimer = setTimeout(() => {
      // After 10s more → sleepy
      setIdle('sleepy');
    }, 5000);
  }, 4000);
}

scheduleIdle(); // start on load

// ── Mouse move: tilt toward cursor ──
document.addEventListener('mousemove', (e) => {
  lastMoveTime = Date.now();

  // reset idle
  if (idleState !== 'normal') {
    setIdle('normal');
    scheduleIdle();
  } else {
    scheduleIdle(); // reset the timer
  }

  if (!kapiWrap) return;
  const rect = kapiWrap.getBoundingClientRect();
  const kapiCenterX = rect.left + rect.width / 2;
  const dx = e.clientX - kapiCenterX;

  // tilt: max ±20deg, smooth with distance falloff
  targetRot = Math.max(-20, Math.min(20, dx * 0.055));
});

// ── Hover: show happy bubble ──
kapiWrap.addEventListener('mouseenter', () => {
  isHovering = true;
  if (idleState === 'normal') showBubble(emotions.happy);
});
kapiWrap.addEventListener('mouseleave', () => {
  isHovering = false;
  if (idleState === 'normal') hideBubble();
});

// ── Leave page → return to center ──
document.addEventListener('mouseleave', () => {
  targetRot = 0;
});

// ── RAF loop: bob + tilt ──
const BOB_AMP   = 9;    // px
const BOB_SPEED = 0.0016; // rad/ms

requestAnimationFrame(function loop(ts) {
  if (lastTs === null) lastTs = ts;
  const dt = Math.min(ts - lastTs, 50); // cap dt
  lastTs = ts;

  bobTime += dt;
  const bobY = -Math.abs(Math.sin(bobTime * BOB_SPEED)) * BOB_AMP;

  // smooth lerp rotation
  currentRot += (targetRot - currentRot) * 0.065;

  kapiWrap.style.transform =
    `translateX(-50%) translateY(${bobY.toFixed(2)}px) rotate(${currentRot.toFixed(2)}deg)`;

  // re-center translateX since we removed it from position
  kapiWrap.style.left = '50%';

  requestAnimationFrame(loop);
});

// ══════════════════════════════════════════════
//  FORM LOGIC
// ══════════════════════════════════════════════

function togglePw() {
  const inp = document.getElementById('password');
  const btn = document.getElementById('pwToggle');
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.textContent = '🙈';
  } else {
    inp.type = 'password';
    btn.textContent = '👁️';
  }
}

function handleSignUp() {
  const fn    = document.getElementById('firstName').value.trim();
  const ln    = document.getElementById('lastName').value.trim();
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('password').value;
  const terms = document.getElementById('terms').checked;

  if (!fn || !ln || !email || !pw) {
    showToast('⚠️ Please fill in all fields.');
    return;
  }
  if (pw.length < 8) {
    showToast('🔑 Password must be at least 8 characters.');
    return;
  }
  if (!terms) {
    showToast('📜 Please agree to the Terms first.');
    return;
  }

  // success
  showToast(`🎉 Welcome, ${fn}! Your library awaits.`);
  setIdle('normal');
  showBubble('🎉 Welcome!');
  setTimeout(hideBubble, 3000);
}

function showToast(msg) {
  const badge = document.getElementById('statusBadge');
  badge.textContent = msg;
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 3200);
}
</script>
